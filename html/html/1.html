<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>快捷打开</title>
  <style>
    body {
      background-color: #f2f2f2;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      color: #333;
      font-size: 36px;
    }

    p {
      color: #666;
      font-size: 18px;
    }

    .link-list {
      margin-top: 50px;
    }

    .link-list a {
      display: block;
      margin-bottom: 10px;
      color: #333;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>快捷打开</h1>
  <p>点击下方链接快速访问网页：</p>

  <div class="link-list" id="linkList">
    <a href="https://www.example.com">示例链接 1</a>
    <a href="https://www.example.com">示例链接 2</a>
    <a href="https://www.example.com">示例链接 3</a>
    <!-- 在这里添加更多的链接 -->
  </div>
</body>
</html>
