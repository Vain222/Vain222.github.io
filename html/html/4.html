<!DOCTYPE html>
<html>
<head>
  <title>Slides</title>
  <style>
    /* CSS 样式 */
    .slides {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
    }

    .section {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .section.active {
      opacity: 1;
    }

    /* 控制按钮样式 */
    .controls {
      text-align: center;
      margin-top: 10px;
    }

    .control-btn {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #ccc;
      margin: 0 5px;
      cursor: pointer;
    }

    .control-btn.active {
      background-color: #333;
    }
  </style>
</head>
<body>
  <div class="slides">
    <div class="section active">
      <h1>第一节</h1>
      <div class="page">
        <h2>第一页</h2>
        <p>第一页的内容</p>
      </div>
      <div class="page">
        <h2>第二页</h2>
        <p>第二页的内容</p>
      </div>
      <div class="page">
        <h2>第三页</h2>
        <p>第三页的内容</p>
      </div>
    </div>
    <div class="section">
      <h1>第二节</h1>
      <div class="page">
        <h2>第一页</h2>
        <p>第一页的内容</p>
      </div>
    </div>
    <div class="section">
      <h1>第三节</h1>
      <div class="page">
        <h2>第一页</h2>
        <p>第一页的内容</p>
      </div>
    </div>
  </div>

  <div class="controls">
    <span class="control-btn active"></span>
    <span class="control-btn"></span>
    <span class="control-btn"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
