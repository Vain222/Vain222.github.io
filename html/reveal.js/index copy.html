<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">

	<title>reveal.js</title>

	<link rel="stylesheet" href="dist/reset.css">
	<link rel="stylesheet" href="dist/reveal.css">
	<link rel="stylesheet" href="dist/theme/simple.css">

	<!-- Theme used for syntax highlighted code -->
	<link rel="stylesheet" href="plugin/highlight/monokai.css">
	<style>
		.reveal .slide-number {
			font-size: 26px;
			border-radius: 5px;
			background-color: rgba(0, 0, 0, .3);
		}

		.reveal .full-screen {
			width: 100%;
			height: 100%;
			object-fit: cover;
			position: absolute;
			top: 0;
			left: 0;
			z-index: -1;
		}

		.reveal .slides {
			border: 1.5px #ddd solid;
			border-radius: 7px;
			text-align: left;
			font-weight: 300;
		}

		.reveal h1,
		.reveal h2,
		.reveal h3,
		.reveal h4 {
			font-family: 'Lato', 'SimHei', 'STXihei', 'Droid Sans';
			font-weight: 400;
		}

		.reveal p,
		.reveal li,
		.reveal center {
			font-size: 32px;
			font-family: 'Lato', 'STHeiti', 'SimHei', 'Droid Sans';
		}

		.reveal li+li {
			margin-top: 10px;
		}

		.reveal ul {
			display: block;
			margin-right: 15px;
		}

		.reveal p,
		.reveal h1,
		.reveal h2,
		.reveal h3,
		.reveal h4,
		.reveal h5 {
			padding: 0 25px 0 25px;
		}

		.reveal table {
			font-size: 32px;
			font-family: 'Lato', 'STHeiti', 'SimHei', 'Sans Serif';
			margin-top: 15px;
			margin-bottom: 15px;
		}

		.reveal th {
			background-color: #eee;
		}

		.reveal tr:nth-child(even) {
			background-color: #efffff;
		}

		.reveal h1,
		.reveal h2,
		.reveal h3,
		.reveal h4,
		.reveal h5,
		.reveal h6 {
			text-align: left;
			margin: 0 0 20px 0;
			color: #222;
			font-weight: 400;
			line-height: 1.2;
			letter-spacing: normal;
		}



		.reveal h1 {
			margin: 0 10 0 10;
			font-size: 60px;
		}

		.reveal .middle h1 {
			text-align: center;
		}

		.reveal h2 {
			font-size: 48px;
			border-bottom: 2px solid rgb(106, 0, 95);
			padding-bottom: 5px;
		}

		.reveal h3 {
			font-size: 1.15em;
		}

		.reveal h4 {
			font-size: 1.05em;
		}

		.reveal .center {
			text-align: center;
		}

		.reveal .middle {
			height: 728px;
			display: flex;
			align-items: center;
			width: 100%;
		}

		.reveal pre {
			font-size: 28px;

			background-color: #eee;

			border-radius: 3mm;
			padding: 10px 10px 10px 10px;
		}

		.reveal pre code {
			max-height: none;
		}

		.reveal code {
			font-family: 'Inconsolata', 'AR PL Ukai CN', 'STKaiti', 'KaiTi', 'Sans Serif', Monospace;
		}

		.reveal .middle blockquote {
			text-align: center;
			color: rgb(106, 0, 95);
			background: none;
			box-shadow: none;
		}

		.reveal .middle blockquote a {
			color: inherit;
		}

		.reveal blockquote p,
		.reveal blockquote li {
			font-family: 'Lato', 'AR PL Ukai CN', 'STKaiti', 'KaiTi', 'Sans Serif';
		}

		section .center {
			display: block;
			margin-left: auto;
			margin-right: auto;
		}

		.reveal .author-block {
			margin: 75px 0 35px 0;
		}

		.reveal .author-affiliation img {
			margin: 15px 0 0 0;
		}

		.reveal .author-block p,
		.reveal .author-affiliation p {
			font-family: 'Kaiti', 'STKaiti', 'Serif', 'Times', 'Times New Roman';
			margin-block-start: 0em;
			margin-block-end: 0em;
		}

		.reveal .author-affiliation {
			display: inline-block;
			font-size: 90%;
		}

		.reveal hr {
			border: 10px solid rgba(0, 0, 0, 0);
		}

		.reveal li {
			margin-top: 10px;
		}
	</style>

# 人工智能
## 1、人工智能的基本概念
- 人工智能，英文缩写为AI。它是研究、开发用于模拟、延伸和扩展人的智能的理论、方法、技术及应用系统的一门新的技术科学。
- 图灵测试：不论机器是否能思维，只看它是否能通过测试。
---
## 2、人工智能的发展简史
<section>

### 1. 孕育阶段
- 逻辑推理
	- 三段论、归纳法、演绎法
- 重要思想
	- 莱布尼茨：万能符号、推理计算，现代机器思维设计思想
	- 布尔《思维法则》：布尔代数
	- 图灵：理想计算机的数学模型——图灵机
- 先驱成果
	- 差分机、ABC机、ENIAC、第⼀个神经网络模型（M-P模型）
- ![[Pasted image 20230425205320.png]]
</section>
<section>

### 2. 达特茅斯会议正式开启人工智能时代（1956）
- “弱人工智能”（Artificial Narrow Intelligence）指只擅长某类任务，工具性的人工智能
- “强人工智能”（Artificial General Intelligence）具有能与人比肩的心智
- “超人工智能”（Artificial Super Intelligence）是“在几乎所有领域都比最聪明的人类大脑都聪明很多”的存在。
</section>
<section>

## 3、人工智能的主要研究领域与典型应用
**主要研究和应用**

<section>

- 搜索
- 智能计算
- 模式识别
- 数据挖掘与知识发现
- 人工神经网络与神经计算
- 计算机视觉
- 自然语言处理

<section>

- 分布式人工智能与多智能体

- 机器人
- 脑机接口
- 智能+X
